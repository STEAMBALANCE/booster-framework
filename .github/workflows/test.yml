name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate strings
        run: bun run scripts/gen-strings.ts

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test

      - name: Build IIFE bundle
        run: bun run build
